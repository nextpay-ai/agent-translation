name: Publish to JSR

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for JSR OIDC auth

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/agent-translation

      - name: Build
        run: bun run build
        working-directory: packages/agent-translation

      - name: Publish to JSR
        run: npx jsr publish --allow-dirty
        working-directory: packages/agent-translation
